name: Compliance Flow Weekly Sync

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  compliance-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance --upgrade
          pip show yfinance # Diagnostic step to see current version

      - name: Execute Masking Pipeline
        env:
          COMPLIANCE_SALT: ${{ secrets.COMPLIANCE_SALT }}
        run: python compliance_etl.py

      - name: Commit Secure Logs
        if: success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f masked_insider_trading.csv ]; then
            git add masked_insider_trading.csv
            git commit -m "compliance: automated masking sync [skip ci]" || echo "No changes"
            git push
          fi
